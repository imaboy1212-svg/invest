name: 주제 후보 추천

on:
  # 실제 운영은 PythonAnywhere 예약 작업(Tasks)에서 담당한다 (06:40, 11:00 UTC).
  # GitHub Actions 자동 스케줄까지 켜져 있으면 같은 시각에 텔레그램이 중복 발송되고
  # 브리핑 파일이 겹쳐 PythonAnywhere 쪽 git pull이 충돌하는 문제가 있어 자동 실행은
  # 끄고, 수동 트리거(workflow_dispatch)로 코드 검증할 때만 쓴다.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run topic recommender
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python topic_recommender.py

      - name: Commit briefings + logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/ logs/ recent_stock_picks.json
          git diff --cached --quiet || git commit -m "chore: 주제 후보 브리핑 자동 생성 ($(date -u +%Y-%m-%d))"
          git push
