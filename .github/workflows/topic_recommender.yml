name: 주제 후보 추천

on:
  schedule:
    - cron: "40 6 * * 1-5"   # KST 15:40 평일 (장마감 후)
    - cron: "0 11 * * 6,0"  # KST 20:00 토·일 (금요일 데이터 + 주말 뉴스)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run topic recommender
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python topic_recommender.py

      - name: Commit briefings + logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/ logs/
          git diff --cached --quiet || git commit -m "chore: 주제 후보 브리핑 자동 생성 ($(date -u +%Y-%m-%d))"
          git push
